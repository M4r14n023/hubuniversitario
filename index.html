<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Productividad</title>
  
  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ========== ESTILOS DEL HUB PRINCIPAL ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --hub-primary: #1a4d2e;
      --hub-bg: #fafafa;
      --hub-surface: #ffffff;
      --hub-text: #2c2c2c;
      --hub-border: #e0e0e0;
      --hub-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--hub-bg);
      color: var(--hub-text);
      min-height: 100vh;
      margin: 0;
    }
    
    /* Navegación principal del hub */
    .hub-nav {
      background: var(--hub-surface);
      border-bottom: 2px solid var(--hub-primary);
      box-shadow: var(--hub-shadow);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    
    .hub-nav-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }
    
    .hub-logo {
      font-family: 'Crimson Pro', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--hub-primary);
      letter-spacing: -0.5px;
      cursor: pointer;
      transition: all 0.2s;
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }
    
    .hub-logo:hover {
      background: rgba(26, 77, 46, 0.08);
      transform: scale(1.02);
    }
    
    .hub-logo:active {
      transform: scale(0.98);
    }
    
    .hub-tabs {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    
    .hub-tab {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .hub-tab:hover {
      color: var(--hub-primary);
      background: rgba(26, 77, 46, 0.05);
    }
    
    .hub-tab.active {
      color: var(--hub-primary);
      border-bottom-color: var(--hub-primary);
      font-weight: 600;
    }
    
    /* Contenedor de apps */
    .app-container {
      display: none;
      width: 100%;
      min-height: calc(100vh - 70px);
    }
    
    .app-container.active {
      display: block;
    }
    
    .app-frame {
      width: 100%;
      min-height: calc(100vh - 70px);
      border: none;
    }
    
    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 70px);
      font-size: 1.2rem;
      color: #666;
    }
    
    .loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .hub-logo {
        font-size: 1.2rem;
      }
      
      .hub-tabs {
        gap: 0.25rem;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      .hub-tab {
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
        flex-shrink: 0;
      }
      
      .hub-nav-content {
        height: auto;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
      }
      
      .app-container {
        min-height: calc(100vh - 120px);
      }
      
      .app-frame {
        min-height: calc(100vh - 120px);
      }
      
      .loading {
        min-height: calc(100vh - 120px);
      }
    }
    
    /* Bienvenida */
    .hub-welcome {
      max-width: 800px;
      margin: 4rem auto;
      padding: 3rem 2rem;
      text-align: center;
    }
    
    .hub-welcome h2 {
      font-family: 'Crimson Pro', serif;
      font-size: 2.5rem;
      color: var(--hub-primary);
      margin-bottom: 1rem;
    }
    
    .hub-welcome p {
      font-size: 1.1rem;
      color: #666;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    
    .app-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    
    .app-card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--hub-shadow);
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      border-color: var(--hub-primary);
    }
    
    .app-card-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .app-card-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--hub-primary);
      margin-bottom: 0.5rem;
    }
    
    .app-card-desc {
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- Navegación del Hub -->
  <nav class="hub-nav">
    <div class="hub-nav-content">
      <div class="hub-logo">📚 Inicio</div>
      <div class="hub-tabs">
        <button class="hub-tab" data-app="agenda">📅 Agenda</button>
        <button class="hub-tab" data-app="gastos">💰 Gastos</button>
        <button class="hub-tab" data-app="ayuno">⏱️ Ayuno</button>
      </div>
    </div>
  </nav>

  <!-- Contenedores de Apps -->
  <div id="app-agenda" class="app-container">
    <iframe class="app-frame" src="apps/agenda.html"></iframe>
  </div>

  <div id="app-gastos" class="app-container">
    <iframe class="app-frame" src="apps/gastos.html"></iframe>
  </div>

  <div id="app-ayuno" class="app-container">
    <iframe class="app-frame" src="apps/ayuno.html"></iframe>
  </div>

  <!-- Bienvenida inicial -->
  <div id="hub-welcome" class="hub-welcome">
    <h2>Bienvenido</h2>
    <p>Gestiona tu vida académica, tus finanzas y tu salud en un solo lugar.</p>
    
    <div class="app-cards">
      <div class="app-card" data-app="agenda">
        <div class="app-card-icon">📅</div>
        <div class="app-card-title">Agenda Universitaria</div>
        <div class="app-card-desc">Organiza tus materias, horarios y exámenes</div>
      </div>
      
      <div class="app-card" data-app="gastos">
        <div class="app-card-icon">💰</div>
        <div class="app-card-title">Trackr Gastos</div>
        <div class="app-card-desc">Controla tus finanzas personales</div>
      </div>
      
      <div class="app-card" data-app="ayuno">
        <div class="app-card-icon">⏱️</div>
        <div class="app-card-title">Ayuno Intermitente</div>
        <div class="app-card-desc">Seguimiento de tus períodos de ayuno</div>
      </div>
    </div>
  </div>

  <script>
    // Sistema de navegación del hub
    const tabs = document.querySelectorAll('.hub-tab');
    const appCards = document.querySelectorAll('.app-card');
    const appContainers = document.querySelectorAll('.app-container');
    const welcome = document.getElementById('hub-welcome');
    const logo = document.querySelector('.hub-logo');
    
    // Recordar última app abierta
    const lastApp = localStorage.getItem('hub_lastApp');
    
    function showApp(appName) {
      // Ocultar todo
      appContainers.forEach(container => container.classList.remove('active'));
      tabs.forEach(tab => tab.classList.remove('active'));
      welcome.style.display = 'none';
      
      // Mostrar app seleccionada
      const container = document.getElementById(`app-${appName}`);
      const tab = document.querySelector(`.hub-tab[data-app="${appName}"]`);
      
      if (container && tab) {
        container.classList.add('active');
        tab.classList.add('active');
        localStorage.setItem('hub_lastApp', appName);
      }
    }
    
    function showHome() {
      // Ocultar todas las apps
      appContainers.forEach(container => container.classList.remove('active'));
      tabs.forEach(tab => tab.classList.remove('active'));
      
      // Mostrar bienvenida
      welcome.style.display = 'block';
      
      // Limpiar última app guardada
      localStorage.removeItem('hub_lastApp');
    }
    
    // Event listener para el logo (volver al inicio)
    logo.addEventListener('click', showHome);
    
    // Event listeners para tabs
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const appName = tab.dataset.app;
        showApp(appName);
      });
    });
    
    // Event listeners para cards
    appCards.forEach(card => {
      card.addEventListener('click', () => {
        const appName = card.dataset.app;
        showApp(appName);
      });
    });
    
    // Cargar última app o mostrar bienvenida
    if (lastApp) {
      showApp(lastApp);
    } else {
      welcome.style.display = 'block';
    }
  </script>
</body>
</html>

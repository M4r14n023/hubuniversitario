      // ============ MODAL DE DATOS ============

      function DataModal({ data, onSave, onClose }) {
        const [step, setStep] = useState(0);
        const [formData, setFormData] = useState(data);

        const steps = ["Período", "Materias", "Cursadas", "Exámenes"];

        const handleNext = () => {
          if (step < steps.length - 1) {
            setStep(step + 1);
          } else {
            onSave(formData);
          }
        };

        const handleBack = () => {
          if (step > 0) setStep(step - 1);
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
              <div className="modal-header">
                <h2 className="modal-title">Configurar datos académicos</h2>
                <button className="modal-close" onClick={onClose}>
                  ×
                </button>
              </div>

              <div className="modal-body">
                <div className="stepper">
                  {steps.map((s, i) => (
                    <div
                      key={s}
                      className={`step ${i === step ? "active" : ""} ${i < step ? "completed" : ""}`}
                    >
                      <div className="step-number">{i + 1}</div>
                      <div className="step-label">{s}</div>
                    </div>
                  ))}
                </div>

                {step === 0 && (
                  <TermStep
                    term={formData.term}
                    onChange={(term) => setFormData({ ...formData, term })}
                  />
                )}

                {step === 1 && (
                  <CoursesStep
                    courses={formData.courses}
                    onChange={(courses) =>
                      setFormData({ ...formData, courses })
                    }
                  />
                )}

                {step === 2 && (
                  <SessionsStep
                    sessions={formData.weeklySessions}
                    courses={formData.courses}
                    onChange={(sessions) =>
                      setFormData({ ...formData, weeklySessions: sessions })
                    }
                  />
                )}

                {step === 3 && (
                  <EventsStep
                    events={formData.events}
                    courses={formData.courses}
                    onChange={(events) => setFormData({ ...formData, events })}
                  />
                )}
              </div>

              <div className="modal-footer">
                {step > 0 && (
                  <button className="btn btn-secondary" onClick={handleBack}>
                    Atrás
                  </button>
                )}
                <button className="btn btn-primary" onClick={handleNext}>
                  {step === steps.length - 1 ? "Guardar" : "Siguiente"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      function TermStep({ term, onChange }) {
        return (
          <div>
            <div className="form-group">
              <label className="form-label">Nombre del período</label>
              <input
                type="text"
                className="form-input"
                value={term.nombre}
                onChange={(e) => onChange({ ...term, nombre: e.target.value })}
              />
            </div>

            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Fecha de inicio</label>
                <input
                  type="date"
                  className="form-input"
                  value={term.startDate}
                  onChange={(e) =>
                    onChange({ ...term, startDate: e.target.value })
                  }
                />
              </div>

              <div className="form-group">
                <label className="form-label">Fecha de fin</label>
                <input
                  type="date"
                  className="form-input"
                  value={term.endDate}
                  onChange={(e) =>
                    onChange({ ...term, endDate: e.target.value })
                  }
                />
              </div>
            </div>
          </div>
        );
      }

      function CoursesStep({ courses, onChange }) {
        const handleAdd = () => {
          onChange([...courses, createEmptyCourse()]);
        };

        const handleRemove = (index) => {
          onChange(courses.filter((_, i) => i !== index));
        };

        const handleChange = (index, field, value) => {
          const updated = [...courses];
          updated[index] = { ...updated[index], [field]: value };
          onChange(updated);
        };

        return (
          <div>
            <div className="item-list">
              {courses.map((course, index) => (
                <div key={course.id} className="item-entry">
                  <div
                    style={{
                      flex: 1,
                      display: "flex",
                      flexDirection: "column",
                      gap: "0.5rem",
                    }}
                  >
                    <input
                      type="text"
                      className="form-input"
                      placeholder="Nombre de la materia"
                      value={course.nombre || ""}
                      onChange={(e) =>
                        handleChange(index, "nombre", e.target.value)
                      }
                    />
                    {/* Restauramos el campo de Email que se había perdido */}
                    <input
                      type="email"
                      className="form-input"
                      placeholder="Email o contacto de la cátedra"
                      value={course.email || ""}
                      onChange={(e) =>
                        handleChange(index, "email", e.target.value)
                      }
                    />
                    <div style={{ display: "flex", gap: "0.5rem" }}>
                      <div style={{ flex: 1 }}>
                        <label
                          style={{
                            fontSize: "0.75rem",
                            color: "var(--text-muted)",
                          }}
                        >
                          Semana inicio Teóricos
                        </label>
                        <input
                          type="date"
                          className="form-input"
                          value={course.inicioTeoricos || ""}
                          onChange={(e) =>
                            handleChange(
                              index,
                              "inicioTeoricos",
                              e.target.value,
                            )
                          }
                        />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label
                          style={{
                            fontSize: "0.75rem",
                            color: "var(--text-muted)",
                          }}
                        >
                          Semana inicio Prácticos
                        </label>
                        <input
                          type="date"
                          className="form-input"
                          value={course.inicioPracticos || ""}
                          onChange={(e) =>
                            handleChange(
                              index,
                              "inicioPracticos",
                              e.target.value,
                            )
                          }
                        />
                      </div>
                    </div>
                  </div>
                  <div className="item-entry-actions">
                    <button
                      className="btn btn-danger btn-sm"
                      onClick={() => handleRemove(index)}
                    >
                      Eliminar
                    </button>
                  </div>
                </div>
              ))}
            </div>

            <button
              className="btn btn-secondary"
              onClick={() => onChange([...courses, createEmptyCourse()])}
              style={{ width: "100%", marginTop: "1rem" }}
            >
              + Agregar Materia
            </button>
          </div>
        );
      }

      function SessionsStep({ sessions, courses, onChange }) {
        const handleAdd = () => {
          onChange([...sessions, createEmptyWeeklySession()]);
        };

        const handleRemove = (index) => {
          onChange(sessions.filter((_, i) => i !== index));
        };

        const handleChange = (index, field, value) => {
          const updated = [...sessions];
          updated[index] = { ...updated[index], [field]: value };
          onChange(updated);
        };

        return (
          <div>
            <div style={{ maxHeight: "400px", overflowY: "auto" }}>
              {sessions.map((session, index) => (
                <div
                  key={session.id}
                  style={{
                    marginBottom: "1.5rem",
                    padding: "1rem",
                    background: "var(--background)",
                    borderRadius: "8px",
                  }}
                >
                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">Materia</label>
                      <select
                        className="form-select"
                        value={session.courseId}
                        onChange={(e) =>
                          handleChange(index, "courseId", e.target.value)
                        }
                      >
                        <option value="">Seleccionar...</option>
                        {courses.map((c) => (
                          <option key={c.id} value={c.id}>
                            {c.nombre}
                          </option>
                        ))}
                      </select>
                    </div>

                    <div className="form-group">
                      <label className="form-label">Modalidad</label>
                      <select
                        className="form-select"
                        value={session.modalidad}
                        onChange={(e) =>
                          handleChange(index, "modalidad", e.target.value)
                        }
                      >
                        <option value="teoria">Teoría</option>
                        <option value="practica">Práctica</option>
                      </select>
                    </div>
                  </div>

                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">Día</label>
                      <select
                        className="form-select"
                        value={session.dayOfWeek}
                        onChange={(e) =>
                          handleChange(
                            index,
                            "dayOfWeek",
                            parseInt(e.target.value),
                          )
                        }
                      >
                        {DAYS_FULL.map((day, i) => (
                          <option key={i} value={i + 1}>
                            {day}
                          </option>
                        ))}
                      </select>
                    </div>

                    <div className="form-group">
                      <label className="form-label">Hora inicio</label>
                      <input
                        type="time"
                        step="60"
                        className="form-input"
                        value={session.startTime}
                        onChange={(e) =>
                          handleChange(index, "startTime", e.target.value)
                        }
                      />
                    </div>

                    <div className="form-group">
                      <label className="form-label">Hora fin</label>
                      <input
                        type="time"
                        step="60"
                        className="form-input"
                        value={session.endTime}
                        onChange={(e) =>
                          handleChange(index, "endTime", e.target.value)
                        }
                      />
                    </div>
                  </div>

                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">Docente</label>
                      <input
                        type="text"
                        className="form-input"
                        value={session.docente}
                        onChange={(e) =>
                          handleChange(index, "docente", e.target.value)

                      />

                    <div className="form-group">
                      <label className="form-label">Aula</label>
                      <input
                        type="text"
                        className="form-input"
                        value={session.aula}
                        onChange={(e) =>
                          handleChange(index, "aula", e.target.value)

                      />
                    </div>

                    <div className="form-group">
                      <label className="form-label">Comisión</label>
                      <input
                        type="text"
                        className="form-input"
                        value={session.numeroComision}
                        onChange={(e) =>
                          handleChange(index, "numeroComision", e.target.value)
                        }
                      />
                    </div>
                  </div>

                  <div className="form-group">
                    <label>
                      <input
                        type="checkbox"
                        className="form-checkbox"

                        onChange={(e) =>
                          handleChange(index, "obligatoria", e.target.checked)

                    </label>
                  </div>

                  <button

                    Eliminar sesión
                  </button>
                </div>
              ))}
            </div>

            <button
              className="btn btn-secondary"
              onClick={handleAdd}
              style={{ marginTop: "1rem" }}
            >
              + Agregar cursada semanal
            </button>
          </div>
        );
      }

      function EventsStep({ events, courses, onChange }) {
        const handleAdd = () => {
          onChange([...events, createEmptyEvent()]);
        };

        const handleRemove = (index) => {
          onChange(events.filter((_, i) => i !== index));
        };

        const handleChange = (index, field, value) => {
          const updated = [...events];
          updated[index] = { ...updated[index], [field]: value };
          // Si cambia el tipo de examen y no es "Otro", limpiar customExamType
          if (field === "examType" && value !== "Otro") {
            updated[index].customExamType = "";
          }

      // Agregamos setHasUnsavedChanges aquí arriba
      function SyncModal({
        data,
        onClose,
        onDataLoaded,
        initialMode = "menu",
        setHasUnsavedChanges,
      }) {
        const [pin, setPin] = useState(
          () => localStorage.getItem("agendaSyncPin") || "",
        );
        const [mode, setMode] = useState(initialMode);
        const [message, setMessage] = useState("");
        const [loading, setLoading] = useState(false);
        const [savedPin, setSavedPin] = useState(
          () => localStorage.getItem("agendaSyncPin") || "",
        );

        const { setDoc, getDoc, doc } = window.firebaseDbFunctions;
        const db = window.firebaseDb;

        const handleUpload = async () => {
          if (!pin || pin.length < 4) {
            setMessage("El PIN debe tener al menos 4 caracteres");
            setMode("error");
            return;
          }

          setLoading(true);
          try {
            const syncTime = new Date().toISOString();
            const deviceName =
              window.innerWidth <= 768 ? "Celular" : "Computadora";

            const docRef = doc(db, "sync-agenda", pin);
            await setDoc(docRef, { ...data, lastSync: syncTime, deviceName });

            localStorage.setItem("agendaSyncPin", pin);
            localStorage.setItem("agendaLocalLastSync", syncTime); // <--- CLAVE PARA QUE NO APAREZCA EL CARTEL AZUL A VOS MISMO

            if (setHasUnsavedChanges) {
              setHasUnsavedChanges(false); // <--- ESTO QUITA EL CARTEL NARANJA
            }

            setSavedPin(pin);
            setMessage("✅ Datos subidos correctamente");
            setMode("success");
          } catch (error) {
            console.error("Error subiendo:", error);
            setMessage("❌ Error al subir datos: " + error.message);
            setMode("error");
          } finally {
            setLoading(false);
          }
        };

        const handleDownload = async () => {
          if (!pin || pin.length < 4) {
            setMessage("Ingresa tu PIN de sincronización");
            setMode("error");
            return;
          }

          setLoading(true);
          try {
            const docRef = doc(db, "sync-agenda", pin);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
              const cloudData = docSnap.data();
              // NUEVO: Extraemos la estampilla antes de borrarla
              const syncTime = cloudData.lastSync;

              delete cloudData.lastSync;
              delete cloudData.deviceName; // Tampoco guardamos el nombre del dispositivo en los datos

              localStorage.setItem("agendaSyncPin", pin);
              // NUEVO: Actualizamos nuestra marca local para saber que ya estamos al día
              localStorage.setItem("agendaLocalLastSync", syncTime);

              setSavedPin(pin);
              onDataLoaded(cloudData);
              setMessage("✅ Datos descargados correctamente");
              setMode("success");
            } else {
              setMessage("❌ No se encontraron datos con ese PIN");
              setMode("error");
            }
          } catch (error) {
            console.error("Error descargando:", error);
            setMessage("❌ Error al descargar: " + error.message);
            setMode("error");
          } finally {
            setLoading(false);
          }
        };
        return (
          <div className="modal-overlay" onClick={onClose}>
            <div
              className="modal"
              onClick={(e) => e.stopPropagation()}
              style={{ maxWidth: "500px" }}
            >
              <div className="modal-header">
                <h2 className="modal-title">☁️ Sincronización en la Nube</h2>
                <button className="modal-close" onClick={onClose}>
                  ✕
                </button>
              </div>

              <div className="modal-body">
                {mode === "menu" && (
                  <div>
                    <p
                      style={{
                        marginBottom: "1.5rem",
                        color: "var(--text-muted)",
                      }}
                    >
                      Sincroniza tus datos entre dispositivos usando un PIN de
                      seguridad.
                    </p>

                    {savedPin && (
                      <div
                        style={{
                          background: "var(--background)",
                          padding: "1rem",
                          borderRadius: "8px",
                          marginBottom: "1.5rem",
                          border: "1px solid var(--border)",
                        }}
                      >
                        <div
                          style={{
                            fontSize: "0.85rem",
                            color: "var(--text-muted)",
                            marginBottom: "0.5rem",
                          }}
                        >
                          PIN guardado:
                        </div>
                        <div
                          style={{
                            fontFamily: "monospace",
                            fontSize: "1.2rem",
                            fontWeight: 600,
                          }}
                        >
                          {savedPin}
                        </div>
                      </div>
                    )}

                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "1rem",
                      }}
                    >
                      <button
                        className="btn btn-primary"
                        onClick={() => setMode("upload")}
                        style={{ width: "100%", padding: "1rem" }}
                      >
                        ⬆️ Subir datos a la nube
                      </button>
                      <button
                        className="btn btn-secondary"
                        onClick={() => setMode("download")}
                        style={{ width: "100%", padding: "1rem" }}
                      >
                        ⬇️ Descargar desde la nube
                      </button>
                    </div>

                    <div
                      style={{
                        marginTop: "1.5rem",
                        padding: "1rem",
                        background: "#dbeafe",
                        borderRadius: "8px",
                        fontSize: "0.85rem",
                        color: "#1e40af",
                        border: "1px solid #93c5fd",
                      }}
                    >
                      <strong>💡 Cómo funciona:</strong>
                      <br />
                      1. Crea un PIN (4-6 dígitos)
                      <br />
                      2. Sube tus datos desde un dispositivo
                      <br />
                      3. Descarga con el mismo PIN en otro dispositivo
                    </div>
                  </div>
                )}

                {mode === "upload" && (
                  <div>
                    <p style={{ marginBottom: "1.5rem" }}>
                      Ingresa un PIN de 4-6 dígitos para proteger tus datos:
                    </p>

                    <div className="form-group">
                      <label className="form-label">
                        PIN de sincronización *
                      </label>
                      <input
                        type="text"
                        inputMode="numeric"
                        pattern="[0-9]*"
                        className="form-input"
                        value={pin}
                        onChange={(e) =>
                          setPin(e.target.value.replace(/\D/g, "").slice(0, 6))
                        }
                        placeholder="Ej: 1234"
                        maxLength={6}
                        style={{
                          fontFamily: "monospace",
                          fontSize: "1.2rem",
                          letterSpacing: "0.3em",
                        }}
                      />
                      <small
                        style={{
                          color: "var(--text-muted)",
                          fontSize: "0.85rem",
                        }}
                      >
                        {savedPin
                          ? "Deja vacío para usar tu PIN guardado"
                          : "Guarda este PIN, lo necesitarás para descargar"}
                      </small>
                    </div>

                    <div
                      style={{
                        display: "flex",
                        gap: "1rem",
                        marginTop: "1.5rem",
                      }}
                    >
                      <button
                        className="btn btn-secondary"
                        onClick={() => {
                          setMode("menu");
                          setPin("");
                          setMessage("");
                        }}
                        disabled={loading}
                        style={{ flex: 1 }}
                      >
                        Cancelar
                      </button>
                      <button
                        className="btn btn-primary"
                        onClick={handleUpload}
                        disabled={loading || (!pin && !savedPin)}
                        style={{ flex: 1 }}
                      >
                        {loading ? "⏳ Subiendo..." : "⬆️ Subir"}
                      </button>
                    </div>
                  </div>
                )}

                {mode === "download" && (
                  <div>
                    <p style={{ marginBottom: "1.5rem" }}>
                      Ingresa el PIN que usaste para subir los datos:
                    </p>

                    <div className="form-group">
                      <label className="form-label">
                        PIN de sincronización *
                      </label>
                      <input
                        type="text"
                        inputMode="numeric"
                        pattern="[0-9]*"
                        className="form-input"
                        value={pin}
                        onChange={(e) =>
                          setPin(e.target.value.replace(/\D/g, "").slice(0, 6))
                        }
                        placeholder={savedPin || "Ej: 1234"}
                        maxLength={6}
                        style={{
                          fontFamily: "monospace",
                          fontSize: "1.2rem",
                          letterSpacing: "0.3em",
                        }}
                      />
                    </div>

                    <div
                      style={{
                        marginTop: "1rem",
                        padding: "0.75rem",
                        background: "#fef3c7",
                        borderRadius: "8px",
                        fontSize: "0.85rem",
                        color: "#92400e",
                        border: "1px solid #fbbf24",
                      }}
                    >
                      ⚠️ <strong>Advertencia:</strong> Esto reemplazará todos
                      tus datos actuales con los de la nube.
                    </div>

                    <div
                      style={{
                        display: "flex",
                        gap: "1rem",
                        marginTop: "1.5rem",
                      }}
                    >
                      <button
                        className="btn btn-secondary"
                        onClick={() => {
                          setMode("menu");
                          setPin("");
                          setMessage("");
                        }}
                        disabled={loading}
                        style={{ flex: 1 }}
                      >
                        Cancelar
                      </button>
                      <button
                        className="btn btn-primary"
                        onClick={handleDownload}
                        disabled={loading || (!pin && !savedPin)}
                        style={{ flex: 1 }}
                      >
                        {loading ? "⏳ Descargando..." : "⬇️ Descargar"}
                      </button>
                    </div>
                  </div>
                )}

                {(mode === "success" || mode === "error") && (
                  <div>
                    <div
                      style={{
                        padding: "1.5rem",
                        borderRadius: "8px",
                        background: mode === "success" ? "#d1fae5" : "#fee2e2",
                        color: mode === "success" ? "#065f46" : "#991b1b",
                        border:
                          mode === "success"
                            ? "1px solid #6fcf97"
                            : "1px solid #dc2626",
                        marginBottom: "1.5rem",
                        fontSize: "1rem",
                        textAlign: "center",
                      }}
                    >
                      {message}
                    </div>

                    <button
                      className="btn btn-primary"
                      onClick={() => {
                        if (mode === "success") {
                          onClose();
                        } else {
                          setMode("menu");
                          setMessage("");
                          setPin("");
                        }
                      }}
                      style={{ width: "100%" }}

                      {mode === "success" ? "Cerrar" : "Volver"}

                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ============ MODAL DE DISPONIBILIDAD HORARIA ============

      function AvailabilityModal({
        sessions,
        extracurricularSessions,
        courses,
        onClose,
      }) {
        const DAYS = [
          { num: 1, name: "Lunes" },
          { num: 2, name: "Martes" },
          { num: 3, name: "Miércoles" },
          { num: 4, name: "Jueves" },
          { num: 5, name: "Viernes" },
          { num: 6, name: "Sábado" },
        ];

        const START_HOUR = 8;
        const END_HOUR = 21;

        // Combinar todas las actividades
        const allActivities = [
          ...sessions.map((s) => ({
            ...s,
            courseName:
              courses.find((c) => c.id === s.courseId)?.nombre || "Desconocido",
            type: "course",
          })),
          ...extracurricularSessions.map((e) => ({
            ...e,
            courseName: getActivityTitle(e),
            type: "extra",
          })),
        ];

        // Función para convertir "HH:MM" a minutos desde medianoche
        const timeToMinutes = (time) => {
          const [h, m] = time.split(":").map(Number);
          return h * 60 + m;
        };

        // Función para convertir minutos a "HH:MM"
        const minutesToTime = (minutes) => {
          const h = Math.floor(minutes / 60);
          const m = minutes % 60;
          return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        };

        // Calcular disponibilidad para un día
        const getAvailabilityForDay = (dayNum) => {
          const dayActivities = allActivities
            .filter((a) => a.dayOfWeek === dayNum)
            .map((a) => ({
              start: timeToMinutes(a.startTime),
              end: timeToMinutes(a.endTime),
              name: a.courseName,
              aula: a.aula || null,
              fullActivity: a,
            }))
            .sort((a, b) => a.start - b.start);

          if (dayActivities.length === 0) {
            return [
              {
                type: "free",
                start: START_HOUR * 60,
                end: END_HOUR * 60,
                message: `Todo el día libre (${START_HOUR}:00 - ${END_HOUR}:00)`,
              },
            ];
          }

          const availability = [];
          const dayStart = START_HOUR * 60;
          const dayEnd = END_HOUR * 60;

          // Libre antes de la primera actividad
          if (dayActivities[0].start > dayStart) {
            availability.push({
              type: "free",
              start: dayStart,
              end: dayActivities[0].start,
              nextActivity: dayActivities[0].name,
              nextStart: dayActivities[0].start,
              message: `Libre hasta ${minutesToTime(dayActivities[0].start)} (inicia: ${dayActivities[0].name})`,
            });
          }

          // Huecos entre actividades
          for (let i = 0; i < dayActivities.length - 1; i++) {
            const current = dayActivities[i];
            const next = dayActivities[i + 1];

            const gap = next.start - current.end;

            // Solo mostrar si hay hueco (gap > 0)
            if (gap > 0) {
              // Verificar si hay cambio de aula
              const aula1 = current.aula
                ? current.aula.trim().toLowerCase()
                : null;
              const aula2 = next.aula ? next.aula.trim().toLowerCase() : null;
              const needsTravel = aula1 && aula2 && aula1 !== aula2;

              availability.push({
                type: "gap",
                start: current.end,
                end: next.start,
                prevActivity: current.name,
                prevAula: current.aula,
                prevEnd: current.end,
                nextActivity: next.name,
                nextAula: next.aula,
                nextStart: next.start,
                needsTravel: needsTravel,
                message: `Libre de ${minutesToTime(current.end)} a ${minutesToTime(next.start)} (termina: ${current.name} → inicia: ${next.name})`,
              });
            }
          }

          // Libre después de la última actividad
          const lastActivity = dayActivities[dayActivities.length - 1];
          if (lastActivity.end < dayEnd) {
            availability.push({
              type: "after",
              start: lastActivity.end,
              end: dayEnd,
              prevActivity: lastActivity.name,
              prevAula: lastActivity.aula,
              prevEnd: lastActivity.end,
              needsTravel: !!lastActivity.aula, // Solo alerta si tiene aula (saldrás de algún lugar)
              message: `Libre desde ${minutesToTime(lastActivity.end)} (termina: ${lastActivity.name})`,
            });
          }

          return availability.length > 0
            ? availability
            : [
                {
                  type: "none",
                  message: "Sin huecos libres",
                },
              ];
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div
              className="modal"
              onClick={(e) => e.stopPropagation()}
              style={{ maxWidth: "900px" }}
            >
              <div className="modal-header">
                <h2 className="modal-title">🕐 Horarios Disponibles</h2>
                <button className="modal-close" onClick={onClose}>
                  ✕
                </button>
              </div>

              <div className="modal-body">
                <p
                  style={{ marginBottom: "1.5rem", color: "var(--text-muted)" }}
                >
                  Horarios libres de lunes a sábado. Los avisos te indican
                  cuándo termina una actividad para que consideres tiempo de
                  traslado.
                </p>

                {DAYS.map((day) => {
                  const availability = getAvailabilityForDay(day.num);

                  return (
                    <div
                      key={day.num}
                      style={{
                        marginBottom: "1.5rem",
                        padding: "1rem",
                        background: "var(--background)",
                        borderRadius: "8px",
                        border: "1px solid var(--border)",
                      }}
                    >
                      <h3
                        style={{
                          fontSize: "1.1rem",
                          fontWeight: 600,
                          marginBottom: "0.75rem",
                          color: "var(--primary)",
                        }}
                      >
                        {day.name}
                      </h3>

                      {availability.map((slot, idx) => {
                        if (slot.type === "none") {
                          return (
                            <div
                              key={idx}
                              style={{
                                padding: "0.75rem",
                                background: "var(--surface)",
                                borderRadius: "6px",
                                color: "var(--text-muted)",
                                fontStyle: "italic",
                              }}
                            >
                              {slot.message}
                            </div>
                          );
                        }

                        return (
                          <div
                            key={idx}
                            style={{
                              padding: "0.75rem",
                              background: "var(--surface)",
                              borderRadius: "6px",
                              marginBottom:
                                idx < availability.length - 1 ? "0.5rem" : 0,
                              borderLeft: `4px solid ${
                                slot.type === "free"
                                  ? "#4ade80"
                                  : slot.type === "after"
                                    ? "#60a5fa"
                                    : "#fbbf24"
                              }`,
                            }}
                          >
                            <div
                              style={{
                                display: "flex",
                                alignItems: "center",
                                gap: "0.5rem",
                                marginBottom: "0.25rem",
                              }}
                            >
                              <span style={{ fontSize: "1.2rem" }}>
                                {slot.type === "free"
                                  ? "✅"
                                  : slot.type === "after"
                                    ? "🏁"
                                    : "⏰"}
                              </span>
                              <span style={{ fontWeight: 600 }}>
                                {minutesToTime(slot.start)} -{" "}
                                {minutesToTime(slot.end)}
                              </span>
                              <span
                                style={{
                                  fontSize: "0.85rem",
                                  color: "var(--text-muted)",
                                  marginLeft: "auto",
                                }}
                              >
                                ({Math.floor((slot.end - slot.start) / 60)}h{" "}
                                {(slot.end - slot.start) % 60}m)
                              </span>
                            </div>

                            <div
                              style={{
                                fontSize: "0.9rem",
                                color: "var(--text-muted)",
                                marginTop: "0.25rem",
                              }}
                            >
                              {slot.message}
                            </div>

                            {/* Mostrar info de aulas si están disponibles */}
                            {slot.type === "gap" &&
                              (slot.prevAula || slot.nextAula) && (
                                <div
                                  style={{
                                    marginTop: "0.5rem",
                                    fontSize: "0.85rem",
                                    color: "var(--text-muted)",
                                    display: "flex",
                                    gap: "1rem",
                                  }}
                                >
                                  {slot.prevAula && (
                                    <span>📍 Sale de: {slot.prevAula}</span>
                                  )}
                                  {slot.nextAula && (
                                    <span>📍 Va a: {slot.nextAula}</span>
                                  )}
                                </div>
                              )}

                            {slot.type === "after" && slot.prevAula && (
                              <div
                                style={{
                                  marginTop: "0.5rem",
                                  fontSize: "0.85rem",
                                  color: "var(--text-muted)",
                                }}
                              >
                                📍 Sale de: {slot.prevAula}
                              </div>
                            )}

                            {/* Solo mostrar aviso de traslado si hay cambio de aula */}
                            {slot.needsTravel && (
                              <div
                                style={{
                                  marginTop: "0.5rem",
                                  padding: "0.5rem",
                                  background: "rgba(251, 191, 36, 0.1)",
                                  borderRadius: "4px",
                                  fontSize: "0.85rem",
                                  color: "#f59e0b",
                                }}
                              >
                                ⚠️ Considera tiempo de traslado entre aulas
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>

              <div className="modal-footer">
                <button className="btn btn-secondary" onClick={onClose}>
                  Cerrar
                </button>
              </div>
            </div>
          </div>
        );
      }

      function SidePanel({
        item,
        courses,
        sessions,
        events,
        onClose,
        onEdit,
        onDelete,
        conflicts,
      }) {
        if (!item || !item.type) return null;

        const handleOverlayClick = (e) => {
          // Solo cerrar si el click es directamente en el overlay, no en sus hijos
          if (e.target === e.currentTarget) {
            onClose();
          }
        };

        // Renderizar panel para actividades extracurriculares
        if (item.type === "extra") {
          const activity = item;
          return (
            <>
              <div
                className="modal-overlay"
                onClick={handleOverlayClick}
                onWheel={(e) => e.stopPropagation()}
                style={{ background: "rgba(0,0,0,0.3)" }}
              />
              <div className="side-panel open">
                <div className="side-panel-header">
                  <h2 className="modal-title">
                    <span style={{ marginRight: "0.5rem" }}>
                      {getActivityIcon(activity.kind)}
                    </span>
                    {getActivityTitle(activity)}
                  </h2>
                  <button className="modal-close" onClick={onClose}>
                    ×
                  </button>
                </div>

                <div className="side-panel-body">
                  <div className="side-panel-section">
                    <div className="side-panel-section-title">Horario</div>
                    <p>
                      {getDayName(activity.dayOfWeek)} •{" "}
                      {formatTime(activity.startTime)} -{" "}
                      {formatTime(activity.endTime)}
                    </p>
                    {activity.startDate && (
                      <p
                        style={{
                          fontSize: "0.9rem",
                          color: "var(--text-muted)",
                          marginTop: "0.25rem",
                        }}
                      >
                        Desde:{" "}
                        {new Date(
                          activity.startDate + "T00:00:00",
                        ).toLocaleDateString("es-AR")}
                      </p>
                    )}
                  </div>

                  {/* Botones de acción */}
                  <div className="side-panel-section">
                    <div style={{ display: "flex", gap: "0.75rem" }}>
                      <button
                        className="btn btn-secondary btn-sm"
                        onClick={() => {
                          onClose();
                          onEdit(activity);
                        }}
                        style={{ flex: 1 }}
                      >
                        ✏️ Editar
                      </button>
                      <button
                        className="btn btn-danger btn-sm"
                        onClick={() => {
                          if (
                            confirm("¿Está seguro de eliminar esta actividad?")
                          ) {
                            onDelete(activity.id);
                            onClose();
                          }
                        }}
                        style={{ flex: 1 }}
                      >
                        🗑️ Eliminar
                      </button>
                    </div>
                  </div>

                  {activity.kind === "gym" &&
                    activity.metadata.muscleGroups &&
                    activity.metadata.muscleGroups.length > 0 && (
                      <div className="side-panel-section">
                        <div className="side-panel-section-title">
                          Grupos musculares
                        </div>
                        <div
                          style={{
                            display: "flex",
                            flexWrap: "wrap",
                            gap: "0.5rem",
                          }}
                        >
                          {activity.metadata.muscleGroups.map((group) => (
                            <span
                              key={group}
                              style={{
                                padding: "0.25rem 0.75rem",
                                background: "var(--background)",
                                borderRadius: "12px",
                                fontSize: "0.9rem",
                              }}
                            >
                              {group}
                            </span>
                          ))}
                        </div>
                      </div>
                    )}

                  {activity.kind === "tenis" && activity.metadata.intensity && (
                    <div className="side-panel-section">
                      <div className="side-panel-section-title">Intensidad</div>
                      <p>{activity.metadata.intensity}</p>
                    </div>
                  )}

                  {activity.kind === "clase_tenis" && (
                    <>
                      {activity.metadata.studentLevel && (
                        <div className="side-panel-section">
                          <div className="side-panel-section-title">
                            Nivel alumnos
                          </div>
                          <p>{activity.metadata.studentLevel}</p>
                        </div>
                      )}
                      {activity.metadata.modality && (
                        <div className="side-panel-section">
                          <div className="side-panel-section-title">
                            Modalidad
                          </div>
                          <p>
                            {activity.metadata.modality}
                            {activity.metadata.modality === "Grupal" &&
                              activity.metadata.studentCount &&
                              ` (${activity.metadata.studentCount} alumnos)`}
                          </p>
                        </div>
                      )}
                    </>
                  )}

                  {activity.kind === "otra" &&
                    activity.metadata.otherDescription && (
                      <div className="side-panel-section">
                        <div className="side-panel-section-title">
                          Descripción
                        </div>
                        <p>{activity.metadata.otherDescription}</p>
                      </div>
                    )}

                  {activity.metadata.note && (
                    <div className="side-panel-section">
                      <div className="side-panel-section-title">Notas</div>
                      <p>{activity.metadata.note}</p>
                    </div>
                  )}
                </div>
              </div>
            </>
          );
        }

        // Renderizar panel para cursos (código original)
        const course =
          item.type === "course"
            ? item
            : courses.find((c) => c.id === item.courseId);
        const courseSessions = sessions.filter(
          (s) => s.courseId === course?.id,
        );
        const courseEvents = events.filter((e) => e.courseId === course?.id);

        return (
          <>
            <div
              className="modal-overlay"
              onClick={handleOverlayClick}
              onWheel={(e) => e.stopPropagation()}
              style={{ background: "rgba(0,0,0,0.3)" }}
            />
            <div className="side-panel open">
              <div className="side-panel-header">
                <h2 className="modal-title">{course?.nombre}</h2>
                <button className="modal-close" onClick={onClose}>
                  ×
                </button>
              </div>

              <div className="side-panel-body">
                {/* Nueva sección: Fechas de cursada */}
                {(course?.startDate || course?.endDate) && (
                  <div className="side-panel-section">
                    <div className="side-panel-section-title">
                      Período de Cursada
                    </div>
                    <div
                      style={{
                        display: "flex",
                        gap: "1rem",
                        fontSize: "0.95rem",
                      }}
                    >
                      {course.startDate && (
                        <div>
                          <strong style={{ color: "var(--text-muted)" }}>
                            Inicio:
                          </strong>
                          <br />
                          {new Date(
                            course.startDate + "T00:00:00",
                          ).toLocaleDateString("es-AR")}
                        </div>
                      )}
                      {course.endDate && (
                        <div>
                          <strong style={{ color: "var(--text-muted)" }}>
                            Fin:
                          </strong>
                          <br />
                          {new Date(
                            course.endDate + "T00:00:00",
                          ).toLocaleDateString("es-AR")}
                        </div>
                      )}
                    </div>
                  </div>
                )}
                {course?.email && (
                  <div className="side-panel-section">
                    <div className="side-panel-section-title">Contacto</div>
                    <p>{course.email}</p>
                  </div>
                )}

                {course?.notas && (
                  <div className="side-panel-section">
                    <div className="side-panel-section-title">Notas</div>
                    <p>{course.notas}</p>
                  </div>
                )}

                {courseSessions.length > 0 && (
                  <div className="side-panel-section">
                    <div className="side-panel-section-title">
                      Cursadas semanales
                    </div>
                    {courseSessions.map((session) => (
                      <div
                        key={session.id}
                        style={{
                          marginBottom: "1rem",
                          padding: "0.75rem",
                          background: "var(--background)",
                          borderRadius: "6px",
                        }}
                      >
                        <div
                          style={{
                            fontWeight: 600,
                            textTransform: "capitalize",
                            marginBottom: "0.5rem",
                            display: "flex",
                            alignItems: "center",
                            gap: "0.5rem",
                          }}
                        >
                          <span>{session.modalidad}</span>
                          {conflicts &&
                            conflicts.some(
                              (c) =>
                                c.session1?.id === session.id ||
                                c.session2?.id === session.id,
                            ) && (
                              <span
                                title="⚠️ Conflicto de horario o distancia detectado con otra cursada"
                                style={{
                                  fontSize: "0.85rem",
                                  cursor: "help",
                                  background: "#fef08a",
                                  padding: "0.1rem 0.3rem",
                                  borderRadius: "4px",
                                  textTransform: "none",
                                  color: "#854d0e",
                                }}
                              >
                                ⚠️ Conflicto
                              </span>
                            )}
                        </div>
                        <div
                          style={{
                            fontSize: "0.9rem",
                            color: "var(--text-muted)",
                          }}
                        >
                          {getDayName(session.dayOfWeek)} •{" "}
                          {formatTime(session.startTime)} -{" "}
                          {formatTime(session.endTime)}
                          {session.aula && (
                            <div style={{ marginTop: "0.25rem" }}>
                              📍 Aula: {session.aula}
                            </div>
                          )}
                          {session.docente && (
                            <div style={{ marginTop: "0.25rem" }}>
                              👤 Docente: {session.docente}
                            </div>
                          )}
                          {session.numeroComision && (
                            <div style={{ marginTop: "0.25rem" }}>
                              📋 Comisión: {session.numeroComision}
                            </div>
                          )}
                          {/* ======================================================= */}
                          {/* NUEVO CÓDIGO AQUÍ: Calculador de fecha de inicio        */}
                          {/* ======================================================= */}
                          {(() => {
                            const baseDate =
                              session.modalidad === "teoria"
                                ? course?.inicioTeoricos
                                : course?.inicioPracticos;
                            if (baseDate) {
                              const exactDate = getExactStartDate(
                                baseDate,
                                session.dayOfWeek,
                              );
                              return (
                                <div
                                  style={{
                                    marginTop: "0.5rem",
                                    padding: "0.25rem 0.5rem",
                                    background: "var(--surface)",
                                    borderRadius: "4px",
                                    fontSize: "0.85rem",
                                    color: "var(--primary)",
                                    fontWeight: 600,
                                    borderLeft: "3px solid var(--primary)",
                                  }}
                                >
                                  🚀 Inicia:{" "}
                                  {exactDate.toLocaleDateString("es-AR", {
                                    weekday: "long",
                                    day: "numeric",
                                    month: "long",
                                  })}
                                </div>
                              );
                            }
                            return null;
                          })()}
                          {/* ======================================================= */}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {courseEvents.length > 0 && (
                  <div className="side-panel-section">
                    <div className="side-panel-section-title">
                      Exámenes y entregas
                    </div>
                    {courseEvents.map((event) => (
                      <div
                        key={event.id}
                        style={{
                          marginBottom: "1rem",
                          padding: "0.75rem",
                          background: "var(--background)",
                          borderRadius: "6px",
                        }}
                      >
                        <div
                          style={{ fontWeight: 600, marginBottom: "0.5rem" }}
                        >
                          {getExamTypeName(event)}
                        </div>
                        <div
                          style={{
                            fontSize: "0.9rem",
                            color: "var(--text-muted)",
                          }}
                        >
                          {new Date(event.dateISO).toLocaleDateString("es-AR", {
                            weekday: "long",
                            year: "numeric",
                            month: "long",
                            day: "numeric",
                          })}
                          {event.notes && (
                            <div style={{ marginTop: "0.5rem" }}>
                              {event.notes}
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </>
        );
      }

      // ============ RENDER ============

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Modo Offline Activo', reg))
            .catch(err => console.log('Error en SW', err));
        });
      }
    </script>
  </body>
</html>

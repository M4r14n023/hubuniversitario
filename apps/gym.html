<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Trackr - PPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Ocultar flechas de los inputs numéricos */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        .checkbox-custom:checked + div { background-color: #f43f5e; border-color: #f43f5e; }
        .checkbox-custom:checked + div svg { display: block; }
    </style>
</head>
<body class="bg-gray-950 text-slate-200 min-h-screen">

    <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-rose-500 flex items-center gap-2">
                <span>🧬</span> Gym Trackr
            </h1>
            <div id="header-stats" class="text-xs font-semibold text-gray-400 bg-gray-800 px-3 py-1.5 rounded-full hidden">
                Progreso: Semana <span id="week-counter" class="text-rose-400">1</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24" id="app-container">
        </main>

    <script>
        // --- 1. BASE DE DATOS DE LA RUTINA (Basado en el PDF) ---
        const routineDB = {
            push: {
                id: 'push', name: 'DÍA 1 - PUSH', color: 'text-blue-400', border: 'border-blue-500',
                exercises: [
                    { id: 'p1', name: 'Press de banca con barra', sets: 4, minReps: 4, maxReps: 6, focus: 'Fuerza' },
                    { id: 'p2', name: 'Press inclinado mancuernas', sets: 3, minReps: 8, maxReps: 10, focus: 'Hipertrofia' },
                    { id: 'p3', name: 'Cruce de poleas', sets: 3, minReps: 12, maxReps: 15, focus: 'Hipertrofia' },
                    { id: 'p4', name: 'Press militar con barra', sets: 3, minReps: 5, maxReps: 7, focus: 'Fuerza' },
                    { id: 'p5', name: 'Elevaciones laterales', sets: 3, minReps: 12, maxReps: 15, focus: 'Hipertrofia' },
                    { id: 'p6', name: 'Flexiones manos juntas', sets: 3, minReps: 8, maxReps: 15, focus: 'Pecho/Tríceps' },
                    { id: 'p7', name: 'Extensión de tríceps polea', sets: 3, minReps: 10, maxReps: 12, focus: 'Hipertrofia' }
                ]
            },
            pull: {
                id: 'pull', name: 'DÍA 2 - PULL', color: 'text-emerald-400', border: 'border-emerald-500',
                exercises: [
                    { id: 'pu1', name: 'Dominadas pronas', sets: 4, minReps: 6, maxReps: 8, focus: 'Fuerza' },
                    { id: 'pu2', name: 'Remo Hammer', sets: 4, minReps: 8, maxReps: 10, focus: 'Hipertrofia' },
                    { id: 'pu3', name: 'Remo con barra', sets: 3, minReps: 6, maxReps: 8, focus: 'Fuerza' },
                    { id: 'pu4', name: 'Jalón al pecho', sets: 3, minReps: 10, maxReps: 12, focus: 'Hipertrofia' },
                    { id: 'pu5', name: 'Remo posterior con barra', sets: 3, minReps: 12, maxReps: 15, focus: 'Hipertrofia' },
                    { id: 'pu6', name: 'Curl de bíceps con barra', sets: 3, minReps: 6, maxReps: 8, focus: 'Fuerza' },
                    { id: 'pu7', name: 'Curl martillo', sets: 3, minReps: 10, maxReps: 12, focus: 'Hipertrofia' }
                ]
            },
            legs: {
                id: 'legs', name: 'DÍA 3 - PIERNAS', color: 'text-amber-400', border: 'border-amber-500',
                exercises: [
                    { id: 'l1', name: 'Sentadilla trasera', sets: 4, minReps: 4, maxReps: 6, focus: 'Fuerza' },
                    { id: 'l2', name: 'Hip Thrust con barra', sets: 4, minReps: 6, maxReps: 8, focus: 'Fuerza' },
                    { id: 'l3', name: 'Prensa de piernas', sets: 3, minReps: 8, maxReps: 10, focus: 'Hipertrofia' },
                    { id: 'l4', name: 'Estocadas fijas', sets: 3, minReps: 10, maxReps: 12, focus: 'Hipertrofia' },
                    { id: 'l5', name: 'Sillón de cuádriceps', sets: 3, minReps: 10, maxReps: 12, focus: 'Hipertrofia' },
                    { id: 'l6', name: 'Peso muerto rumano', sets: 3, minReps: 6, maxReps: 8, focus: 'Fuerza' },
                    { id: 'l7', name: 'Curl femoral', sets: 3, minReps: 10, maxReps: 12, focus: 'Hipertrofia' },
                    { id: 'l8', name: 'Elevaciones de gemelos', sets: 4, minReps: 12, maxReps: 20, focus: 'Hipertrofia' }
                ]
            }
        };

        // --- 2. ESTADO DE LA APLICACIÓN ---
        let appState = JSON.parse(localStorage.getItem('gymTrackrState')) || {
            isInitialized: false,
            baselineWeights: {}, // Pesos iniciales { exId: weight }
            history: [],         // Registro de entrenos terminados
            currentWorkout: null // Si hay un entreno en curso
        };

        const container = document.getElementById('app-container');
        const headerStats = document.getElementById('header-stats');

        // Guardar estado
        function saveState() {
            localStorage.setItem('gymTrackrState', JSON.stringify(appState));
        }

        // --- 3. VISTAS ---

        // VISTA 1: Setup Inicial (Primera Semana)
        function renderSetup() {
            let html = `
                <div class="mb-6 text-center">
                    <h2 class="text-2xl font-bold text-white mb-2">Semana de Calibración</h2>
                    <p class="text-gray-400 text-sm">Ingresa los pesos estimados (en Kg) que usarás en tu primera semana. Esto nos servirá de base para medir tu progreso.</p>
                </div>
            `;

            ['push', 'pull', 'legs'].forEach(blockKey => {
                const block = routineDB[blockKey];
                html += `
                    <div class="bg-gray-900 rounded-xl p-4 mb-4 border border-gray-800">
                        <h3 class="font-bold mb-3 ${block.color}">${block.name}</h3>
                        <div class="space-y-3">
                `;
                
                block.exercises.forEach(ex => {
                    html += `
                        <div class="flex justify-between items-center bg-gray-950 p-3 rounded-lg border border-gray-800">
                            <div class="flex-1 pr-2">
                                <p class="text-sm font-semibold text-gray-200">${ex.name}</p>
                                <p class="text-[10px] text-gray-500">${ex.sets} series x ${ex.minReps}-${ex.maxReps} reps</p>
                            </div>
                            <div class="flex items-center gap-1">
                                <input type="number" id="setup-${ex.id}" placeholder="0" class="w-16 bg-gray-800 text-white text-center rounded p-2 border border-gray-700 focus:border-rose-500 outline-none">
                                <span class="text-xs text-gray-500">kg</span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            });

            html += `<button onclick="finishSetup()" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-4 rounded-xl mt-4 transition shadow-lg shadow-rose-900/50">Guardar Pesos Iniciales</button>`;
            
            container.innerHTML = html;
        }

        // Finalizar Setup
        window.finishSetup = function() {
            let baseline = {};
            ['push', 'pull', 'legs'].forEach(bk => {
                routineDB[bk].exercises.forEach(ex => {
                    const val = document.getElementById(`setup-${ex.id}`).value;
                    baseline[ex.id] = val ? parseFloat(val) : 0;
                });
            });
            appState.baselineWeights = baseline;
            appState.isInitialized = true;
            saveState();
            renderDashboard();
        }

        // VISTA 2: Dashboard (Elegir Entreno)
        function renderDashboard() {
            headerStats.classList.remove('hidden');
            const totalWorkouts = appState.history.length;
            document.getElementById('week-counter').innerText = Math.floor(totalWorkouts / 3) + 1;

            let html = `
                <div class="bg-gradient-to-br from-gray-900 to-gray-950 p-6 rounded-2xl border border-gray-800 shadow-xl mb-8 text-center">
                    <h2 class="text-lg font-bold text-gray-300 mb-6">¿Qué toca entrenar hoy?</h2>
                    <div class="grid grid-cols-1 gap-4">
            `;

            ['push', 'pull', 'legs'].forEach(bk => {
                const block = routineDB[bk];
                // Buscar cuándo fue la última vez que hizo este bloque
                const lastLog = [...appState.history].reverse().find(h => h.blockId === bk);
                const lastDateStr = lastLog ? new Date(lastLog.date).toLocaleDateString('es-ES', {weekday: 'short', day: 'numeric'}) : 'Nunca';

                html += `
                    <button onclick="startWorkout('${bk}')" class="relative overflow-hidden group bg-gray-800 hover:bg-gray-700 border-l-4 ${block.border} p-4 rounded-xl flex items-center justify-between transition-all">
                        <div class="text-left z-10">
                            <h3 class="font-bold text-lg text-white group-hover:${block.color} transition">${block.name}</h3>
                            <p class="text-xs text-gray-400 mt-1">Última vez: ${lastDateStr}</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gray-900 flex items-center justify-center text-gray-400 group-hover:text-white transition z-10">
                            ▶
                        </div>
                    </button>
                `;
            });

            html += `</div></div>`;

            // Historial Reciente
            html += `
                <div>
                    <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Historial Reciente</h3>
                    <div class="space-y-3">
            `;

            if(appState.history.length === 0) {
                html += `<p class="text-center text-gray-600 text-sm italic">Aún no hay entrenamientos registrados.</p>`;
            } else {
                [...appState.history].reverse().slice(0, 5).forEach(log => {
                    const block = routineDB[log.blockId];
                    const date = new Date(log.date).toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short'});
                    html += `
                        <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 flex justify-between items-center opacity-80">
                            <div>
                                <p class="text-sm font-bold ${block.color}">${block.name}</p>
                                <p class="text-xs text-gray-400 capitalize">${date}</p>
                            </div>
                            <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-300 border border-gray-700">✓ Completado</span>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            container.innerHTML = html;
        }

        // VISTA 3: Entreno Activo
        window.startWorkout = function(blockId) {
            const block = routineDB[blockId];
            
            // Crear instancia de entreno
            let workout = {
                blockId: blockId,
                date: new Date().toISOString(),
                logs: {} // { exId: [ {reps, weight, done} ] }
            };

            // Preparar las series buscando el historial
            block.exercises.forEach(ex => {
                workout.logs[ex.id] = [];
                
                // Lógica de progresión: Buscar último peso usado en este ejercicio
                let suggestedWeight = appState.baselineWeights[ex.id] || 0;
                let shouldIncrease = false;

                const lastLog = [...appState.history].reverse().find(h => h.blockId === blockId);
                if (lastLog && lastLog.logs[ex.id]) {
                    const prevSets = lastLog.logs[ex.id];
                    suggestedWeight = prevSets[0].weight; // Usar el peso de la serie 1 como base
                    
                    // ¿Cumplió todas las series al máximo de repeticiones?
                    const allMaxed = prevSets.every(s => s.reps >= ex.maxReps && s.done);
                    if (allMaxed) {
                        shouldIncrease = true;
                        // Regla: Aumentar ~2.5% a 5% [Ref PDF Progresión]
                        suggestedWeight = Math.round((suggestedWeight * 1.05) * 2) / 2; // Redondea a 0.5kg
                    }
                }

                for(let i=0; i<ex.sets; i++) {
                    workout.logs[ex.id].push({
                        reps: ex.maxReps, // Sugerimos el máximo a apuntar
                        weight: suggestedWeight,
                        done: false,
                        shouldIncrease: shouldIncrease && i===0 // Solo mostrar flag en la serie 1
                    });
                }
            });

            appState.currentWorkout = workout;
            saveState();
            renderActiveWorkout();
        }

        function renderActiveWorkout() {
            const blockId = appState.currentWorkout.blockId;
            const block = routineDB[blockId];

            let html = `
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <button onclick="cancelWorkout()" class="text-xs text-gray-500 hover:text-white flex items-center gap-1 mb-1">
                            ← Cancelar
                        </button>
                        <h2 class="text-2xl font-black ${block.color}">${block.name}</h2>
                    </div>
                    <button onclick="finishWorkout()" class="bg-rose-600 text-white text-sm font-bold px-4 py-2 rounded-lg shadow-lg">Finalizar</button>
                </div>
                
                <div class="bg-rose-950/30 border border-rose-900/50 p-3 rounded-lg mb-6 flex items-start gap-3">
                    <span class="text-xl">💡</span>
                    <p class="text-xs text-rose-200/80 leading-relaxed">
                        <strong>Tips del Profe:</strong> Prioriza técnica estricta. Deja 1-2 reps en el tanque (RIR). Descansa 2-3 min para Fuerza, 60-90s para Hipertrofia.
                    </p>
                </div>

                <div class="space-y-6">
            `;

            block.exercises.forEach(ex => {
                const logs = appState.currentWorkout.logs[ex.id];
                const needsIncrease = logs[0].shouldIncrease;

                html += `
                    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
                        <div class="bg-gray-800/50 p-3 border-b border-gray-800 flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-gray-100">${ex.name}</h3>
                                <p class="text-[10px] font-semibold text-gray-400 mt-1 uppercase tracking-wider">${ex.focus} • Objetivo: ${ex.minReps}-${ex.maxReps} reps</p>
                            </div>
                        </div>
                `;

                if(needsIncrease) {
                    html += `
                        <div class="bg-emerald-950/50 border-b border-emerald-900/50 px-3 py-1.5 text-[10px] text-emerald-400 font-bold text-center flex items-center justify-center gap-1">
                            <span>📈</span> ¡Dominaste este peso! Intenta subir la carga.
                        </div>
                    `;
                }

                html += `<div class="p-3 space-y-2">`;

                // Series Fijas
                logs.forEach((set, index) => {
                    const isDone = set.done;
                    html += `
                        <div class="flex items-center gap-2 ${isDone ? 'opacity-50' : ''} transition-opacity">
                            <div class="w-6 text-center text-xs font-bold text-gray-500">${index + 1}</div>
                            
                            <div class="flex-1 relative">
                                <input type="number" step="0.5" id="w-${ex.id}-${index}" value="${set.weight}" 
                                    onchange="updateSet('${ex.id}', ${index}, 'weight', this.value)"
                                    class="w-full bg-gray-950 text-white text-center text-lg font-bold rounded-lg py-2 border border-gray-700 focus:border-rose-500 outline-none">
                                <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-gray-500">kg</span>
                            </div>

                            <span class="text-gray-600">x</span>

                            <div class="flex-1 relative">
                                <input type="number" id="r-${ex.id}-${index}" value="${set.reps}" 
                                    onchange="updateSet('${ex.id}', ${index}, 'reps', this.value)"
                                    class="w-full bg-gray-950 text-white text-center text-lg font-bold rounded-lg py-2 border border-gray-700 focus:border-rose-500 outline-none">
                                <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-gray-500">reps</span>
                            </div>

                            <label class="relative flex items-center justify-center cursor-pointer w-12 h-10">
                                <input type="checkbox" class="sr-only checkbox-custom" ${isDone ? 'checked' : ''} onchange="toggleSet('${ex.id}', ${index})">
                                <div class="w-8 h-8 rounded-lg border-2 border-gray-600 bg-gray-800 flex items-center justify-center transition-colors">
                                    <svg class="w-5 h-5 text-white hidden pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </label>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        // Lógica de Entreno Activo
        window.updateSet = function(exId, setIndex, field, value) {
            appState.currentWorkout.logs[exId][setIndex][field] = parseFloat(value) || 0;
            saveState();
        }

        window.toggleSet = function(exId, setIndex) {
            appState.currentWorkout.logs[exId][setIndex].done = !appState.currentWorkout.logs[exId][setIndex].done;
            saveState();
            renderActiveWorkout(); // Re-render para opacidad
        }

        window.cancelWorkout = function() {
            if(confirm('¿Seguro que quieres cancelar este entreno? No se guardará.')) {
                appState.currentWorkout = null;
                saveState();
                renderDashboard();
            }
        }

        window.finishWorkout = function() {
            // Validar que haya marcado al menos una serie
            let hasDoneSets = false;
            Object.values(appState.currentWorkout.logs).forEach(sets => {
                if(sets.some(s => s.done)) hasDoneSets = true;
            });

            if(!hasDoneSets) {
                alert('No has completado ninguna serie.');
                return;
            }

            // Guardar al historial
            appState.history.push(appState.currentWorkout);
            appState.currentWorkout = null;
            saveState();
            renderDashboard();
        }

        // --- 4. INICIALIZADOR ---
        function init() {
            if (!appState.isInitialized) {
                renderSetup();
            } else if (appState.currentWorkout) {
                renderActiveWorkout();
            } else {
                renderDashboard();
            }
        }

        init();
    </script>
</body>
</html>
